<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet">
   <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="app">
        <aside class="sidebar">
            <div class="logo">My<span>Sound</span></div>
            <nav class="nav">
                <div class="nav-section">Biblioteca</div>
                <div class="nav-item active" onclick="setNav(this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18V5l12-2v13" />
                        <circle cx="6" cy="18" r="3" />
                        <circle cx="18" cy="16" r="3" />
                    </svg>
                    Todas as músicas
                </div>
                <div class="nav-item" onclick="setNav(this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z" />
                    </svg>
                    Favoritas
                </div>
                <div class="nav-item" onclick="setNav(this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 20h9" />
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                    </svg>
                    Playlists
                </div>
                <div class="nav-section" style="margin-top:16px;">Fila</div>
            </nav>
            <div class="sidebar-playlist" id="sidebarPlaylist"></div>
        </aside>

        <main class="main">
            <header class="main-header">
                <div>
                    <h1 class="page-title">Suas Músicas</h1>
                    <p class="page-subtitle" id="trackCount">0 faixas na sua biblioteca</p>
                </div>
                <div class="search-box">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" placeholder="Buscar..." id="searchInput" oninput="filterTracks()">
                </div>
            </header>

            <div class="now-playing-hero" id="heroSection">
                <div class="hero-bg"></div>
                <div class="hero-cover" id="heroCover">🎵</div>
                <div class="hero-info">
                    <div class="hero-badge">▶ Tocando agora</div>
                    <div class="hero-title" id="heroTitle">Nenhuma música</div>
                    <div class="hero-artist" id="heroArtist">Selecione uma faixa</div>
                    <div class="hero-tags">
                        <span class="tag" id="heroGenre">—</span>
                        <span class="tag" id="heroYear">—</span>
                    </div>
                </div>
            </div>

            <div class="section-header">
                <div class="section-title">Biblioteca</div>
                <div class="section-count" id="visibleCount"></div>
            </div>
            <div class="track-list" id="trackList"></div>

            <div style="height: 20px;"></div>
        </main>

        <footer class="player">
            <div class="player-track">
                <div class="player-thumb" id="playerThumb">🎵</div>
                <div class="player-track-info">
                    <div class="player-track-name" id="playerName">Nenhuma faixa</div>
                    <div class="player-track-artist" id="playerArtist">—</div>
                </div>
                <button class="player-heart" id="playerHeart" onclick="toggleLikeCurrent()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z" />
                    </svg>
                </button>
            </div>

            <div class="player-controls">
                <div class="controls-btns">
                    <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Aleatório">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="16 3 21 3 21 8" />
                            <line x1="4" y1="20" x2="21" y2="3" />
                            <polyline points="21 16 21 21 16 21" />
                            <line x1="4" y1="4" x2="9" y2="9" />
                        </svg>
                    </button>
                    <button class="ctrl-btn" onclick="prevTrack()" title="Anterior">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="19 20 9 12 19 4 19 20" />
                            <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2" />
                        </svg>
                    </button>
                    <button class="play-btn" id="playBtn" onclick="togglePlay()">
                        <svg id="playIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 3 19 12 5 21 5 3" />
                        </svg>
                    </button>
                    <button class="ctrl-btn" onclick="nextTrack()" title="Próxima">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 4 15 12 5 20 5 4" />
                            <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2" />
                        </svg>
                    </button>
                    <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()" title="Repetir">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="17 1 21 5 17 9" />
                            <path d="M3 11V9a4 4 0 0 1 4-4h14" />
                            <polyline points="7 23 3 19 7 15" />
                            <path d="M21 13v2a4 4 0 0 1-4 4H3" />
                        </svg>
                    </button>
                </div>
                <div class="progress-row">
                    <span class="time-label" id="currentTime">0:00</span>
                    <div class="progress-bar" id="progressBar" onclick="seekTo(event)">
                        <div class="progress-fill" id="progressFill" style="width:0%"></div>
                    </div>
                    <span class="time-label" id="totalTime">0:00</span>
                </div>
            </div>

            <div class="player-volume">
                <button class="vol-btn" onclick="toggleMute()">
                    <svg id="volIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                    </svg>
                </button>
                <div class="vol-slider" id="volSlider" onclick="setVolume(event)">
                    <div class="vol-fill" id="volFill" style="width:80%"></div>
                </div>
                <div class="eq" id="eqBars">
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                </div>
            </div>
        </footer>
    </div>

    <!-- FAB -->
    <button class="fab" onclick="openModal()" title="Adicionar música">+</button>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
        <div class="modal">
            <div class="modal-title">Adicionar Música</div>

            <div class="form-group">
                <label class="form-label">Título da música</label>
                <input type="text" class="form-input" id="inputTitle" placeholder="Ex: Blinding Lights">
            </div>
            <div class="form-group">
                <label class="form-label">Artista</label>
                <input type="text" class="form-input" id="inputArtist" placeholder="Ex: The Weeknd">
            </div>
            <div class="form-group">
                <label class="form-label">Gênero</label>
                <input type="text" class="form-input" id="inputGenre" placeholder="Ex: Pop, Rock, MPB...">
            </div>
            <div class="form-group">
                <label class="form-label">Ano</label>
                <input type="text" class="form-input" id="inputYear" placeholder="Ex: 2024">
            </div>
            <div class="form-group">
                <label class="form-label">URL do arquivo de áudio</label>
                <input type="text" class="form-input" id="inputUrl" placeholder="https://... (mp3, ogg, wav)">
            </div>
            <div class="form-group">
                <label class="form-label">Emoji / capa</label>
                <div class="emoji-picker" id="emojiPicker">
                    <div class="emoji-opt selected" onclick="selectEmoji(this, '🎵')">🎵</div>
                    <div class="emoji-opt" onclick="selectEmoji(this, '🎸')">🎸</div>
                    <div class="emoji-opt" onclick="selectEmoji(this, '🎹')">🎹</div>
                    <div class="emoji-opt" onclick="selectEmoji(this, '🎷')">🎷</div>
                    <div class="emoji-opt" onclick="selectEmoji(this, '🥁')">🥁</div>
                    <div class="emoji-opt" onclick="selectEmoji(this, '🎻')">🎻</div>
                    <div class="emoji-opt" onclick="selectEmoji(this, '🎤')">🎤</div>
                    <div class="emoji-opt" onclick="selectEmoji(this, '🎧')">🎧</div>
                    <div class="emoji-opt" onclick="selectEmoji(this, '🌊')">🌊</div>
                    <div class="emoji-opt" onclick="selectEmoji(this, '🔥')">🔥</div>
                    <div class="emoji-opt" onclick="selectEmoji(this, '⭐')">⭐</div>
                    <div class="emoji-opt" onclick="selectEmoji(this, '💜')">💜</div>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-accent" onclick="addTrack()">Adicionar</button>
            </div>
        </div>
    </div>

    <audio id="audioEl"></audio>

    <script src="./js/script.js"></script>

</body>

</html>
